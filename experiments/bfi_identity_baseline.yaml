# wallflower experiment: BFI identity baseline (HEADLINE RESULT)
#
# Reproduction of BFId (Todt, Morsbach, Strufe, CCS '25).
#
# Reproduces the paper's headline: BFI identity accuracy 99.5% +- 0.38 from
# normal walking, aggregated over all 4 perspectives. Consumed by
# models/train.py and models/evaluate.py.
#
# Field names mirror the models stack:
#   data.{styles,perspectives,participants} -> models.dataset.load_index(...)
#   split.{train_frac,seed,repeats}         -> stratified_split(test_frac=1-train_frac, seed=...)
#   model.{hidden,lstm_layers,fc_hidden,dropout} -> models.lstm_classifier.BFIdLSTM(...)
#   standardise -> fit models.dataset.Standardiser on the train split only.

schema_version: "1.0"
name: bfi_identity_baseline
description: >
  Baseline identity classifier on BFI from normal walking, all perspectives
  pooled. The paper's headline reproduction target.

modality: bfi

data:
  # null participants => all participants present in samples.parquet.
  participants: null
  styles: [normal]
  perspectives: [1, 2, 3, 4]

split:
  train_frac: 0.8          # paper 80/20 split
  seed: 1337
  repeats: 5               # mean +- std over 5 seeded splits (paper reporting)

model:
  hidden: 128
  lstm_layers: 2
  fc_hidden: 64
  dropout: 0.2

optim:
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 32
  epochs: 60

standardise: true

metric: top1

paper_reference: "Todt et al., CCS '25 — headline result (sec. 5.3)."
expected_result: "BFI top-1 identity accuracy ~99.5% +- 0.38 (normal walking)."
